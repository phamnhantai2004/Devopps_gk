<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Student Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px 20px;
        }

        .info-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .info-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .info-item {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .info-item label {
            display: block;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .info-item p {
            color: #333;
            font-size: 1.1em;
        }

        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #764ba2;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1em;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
            margin-left: 10px;
        }

        .students-list {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .students-list h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        table tr:hover {
            background: #f5f5f5;
        }

        .action-btn {
            padding: 6px 12px;
            font-size: 0.9em;
            margin-right: 5px;
        }

        .btn-edit {
            background: #28a745;
        }

        .btn-delete {
            background: #dc3545;
        }

        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status.ok {
            background: #d4edda;
            color: #155724;
        }

        .message {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-in;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.9em;
            }

            table th,
            table td {
                padding: 8px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎓 DevOps Student Management System</h1>
            <p>Quản lý thông tin sinh viên với Backend + Frontend + Database</p>
        </header>

        <div class="content">
            <!-- Student Info Section -->
            <div class="info-section">
                <h2>📋 Thông Tin Sinh Viên</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <label>Họ Tên</label>
                        <p id="studentName">Loading...</p>
                    </div>
                    <div class="info-item">
                        <label>Mã Số Sinh Viên</label>
                        <p id="studentId">Loading...</p>
                    </div>
                    <div class="info-item">
                        <label>Lớp</label>
                        <p id="studentClass">Loading...</p>
                    </div>
                    <div class="info-item">
                        <label>Trạng Thái Hệ Thống</label>
                        <p><span class="status ok" id="healthStatus">Loading...</span></p>
                    </div>
                </div>
            </div>

            <!-- Add New Student Form -->
            <div class="form-section">
                <h2>➕ Thêm Sinh Viên Mới</h2>
                <form id="addStudentForm">
                    <div class="info-grid">
                        <div class="form-group">
                            <label>Tên Sinh Viên *</label>
                            <input type="text" id="newName" placeholder="Nhập tên" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="newEmail" placeholder="Nhập email" required>
                        </div>
                        <div class="form-group">
                            <label>Số Điện Thoại</label>
                            <input type="tel" id="newPhone" placeholder="Nhập số điện thoại">
                        </div>
                        <div class="form-group">
                            <label>Chuyên Ngành</label>
                            <input type="text" id="newMajor" placeholder="Nhập chuyên ngành">
                        </div>
                    </div>
                    <button type="submit">Thêm Sinh Viên</button>
                </form>
            </div>

            <!-- Messages -->
            <div id="messageContainer"></div>

            <!-- Students List -->
            <div class="students-list">
                <h2>👥 Danh Sách Sinh Viên</h2>
                <div id="loadingMessage" class="loading">Đang tải dữ liệu...</div>
                <table id="studentsTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên</th>
                            <th>Email</th>
                            <th>Số Điện Thoại</th>
                            <th>Chuyên Ngành</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;

        // Show message
        function showMessage(message, type = 'success') {
            const container = document.getElementById('messageContainer');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${type}`;
            messageEl.textContent = message;
            container.appendChild(messageEl);

            setTimeout(() => {
                messageEl.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => messageEl.remove(), 300);
            }, 3000);
        }

        // Load student info and health status
        async function loadStudentInfo() {
            try {
                const [aboutRes, healthRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/about`),
                    fetch(`${API_BASE_URL}/health`)
                ]);

                if (aboutRes.ok) {
                    const about = await aboutRes.json();
                    document.getElementById('studentName').textContent = about.student_name || 'N/A';
                    document.getElementById('studentId').textContent = about.student_id || 'N/A';
                    document.getElementById('studentClass').textContent = about.class || 'N/A';
                }

                if (healthRes.ok) {
                    const health = await healthRes.json();
                    document.getElementById('healthStatus').textContent = health.status === 'ok' ? '✓ OK' : 'Error';
                }
            } catch (error) {
                console.error('Error loading student info:', error);
                document.getElementById('healthStatus').textContent = 'Error';
            }
        }

        // Load students list
        async function loadStudents() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/students`);
                if (!response.ok) throw new Error('Failed to load students');

                const result = await response.json();
                const students = result.data || [];

                const tableBody = document.getElementById('studentsTableBody');
                const loadingMsg = document.getElementById('loadingMessage');
                const table = document.getElementById('studentsTable');

                if (students.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Chưa có dữ liệu sinh viên</td></tr>';
                } else {
                    tableBody.innerHTML = students.map(student => `
                        <tr>
                            <td>${student.id}</td>
                            <td>${student.name}</td>
                            <td>${student.email}</td>
                            <td>${student.phone || 'N/A'}</td>
                            <td>${student.major || 'N/A'}</td>
                            <td>
                                <button class="action-btn btn-edit" onclick="editStudent(${student.id}, '${student.name}', '${student.email}', '${student.phone || ''}', '${student.major || ''}')">Sửa</button>
                                <button class="action-btn btn-delete" onclick="deleteStudent(${student.id})">Xóa</button>
                            </td>
                        </tr>
                    `).join('');
                }

                loadingMsg.style.display = 'none';
                table.style.display = 'table';
            } catch (error) {
                console.error('Error loading students:', error);
                document.getElementById('loadingMessage').textContent = 'Lỗi khi tải dữ liệu';
            }
        }

        // Add student form submission
        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('newName').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const phone = document.getElementById('newPhone').value.trim();
            const major = document.getElementById('newMajor').value.trim();

            if (!name || !email) {
                showMessage('Vui lòng nhập tên và email', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/students`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone: phone || null, major: major || null })
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage('Thêm sinh viên thành công!', 'success');
                    document.getElementById('addStudentForm').reset();
                    loadStudents();
                } else {
                    showMessage(result.error || 'Lỗi khi thêm sinh viên', 'error');
                }
            } catch (error) {
                console.error('Error adding student:', error);
                showMessage('Lỗi khi kết nối đến server', 'error');
            }
        });

        // Edit student (placeholder functionality)
        function editStudent(id, name, email, phone, major) {
            document.getElementById('newName').value = name;
            document.getElementById('newEmail').value = email;
            document.getElementById('newPhone').value = phone;
            document.getElementById('newMajor').value = major;
            document.getElementById('addStudentForm').dataset.editId = id;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Delete student
        async function deleteStudent(id) {
            if (!confirm('Bạn chắc chắn muốn xóa sinh viên này?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/api/students/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage('Xóa sinh viên thành công!', 'success');
                    loadStudents();
                } else {
                    showMessage(result.error || 'Lỗi khi xóa sinh viên', 'error');
                }
            } catch (error) {
                console.error('Error deleting student:', error);
                showMessage('Lỗi khi kết nối đến server', 'error');
            }
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadStudentInfo();
            loadStudents();
        });
    </script>
</body>

</html>
